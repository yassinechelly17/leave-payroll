spring.application.name=leave-payroll-backend

server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/leave_payroll
spring.datasource.username=leave_payroll
spring.datasource.password=leave_payroll

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3001}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
