spring.profiles.default=local
spring.cloud.compatibility-verifier.enabled=false

spring.application.name=leave-payroll-backend
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5433/leave_payroll
spring.datasource.username=leave_payroll
spring.datasource.password=leave_payroll

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/workforce-realm}

spring.security.oauth2.client.registration.leave-payroll.provider=keycloak
spring.security.oauth2.client.registration.leave-payroll.client-id=${KEYCLOAK_CLIENT_ID:leave-payroll-backend}
spring.security.oauth2.client.registration.leave-payroll.client-secret=${KEYCLOAK_CLIENT_SECRET:leave-payroll-secret}
spring.security.oauth2.client.registration.leave-payroll.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.leave-payroll.scope=openid
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/workforce-realm/protocol/openid-connect/token}
spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/workforce-realm}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

app.payroll.hourly-rate=15.00
app.payroll.default-employee-ids=1,2,3
